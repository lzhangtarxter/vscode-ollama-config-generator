name: Build Linux

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      PYTHON_VERSION: "3.14"
      APP_NAME: ContinueConfigGenerator
      ARCHIVE_NAME: ContinueConfigGenerator-linux-x64.tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Build app bundle
        run: pipenv run pyinstaller --noconfirm --clean --windowed --name "$APP_NAME" app.py

      - name: Package artifact
        run: tar -czf "dist/$ARCHIVE_NAME" -C dist "$APP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-x64
          path: dist/${{ env.ARCHIVE_NAME }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARCHIVE_NAME }}
