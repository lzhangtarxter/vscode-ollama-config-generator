name: Build macOS Intel

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-13
    env:
      PYTHON_VERSION: "3.14"
      APP_NAME: ContinueConfigGenerator
      ARCHIVE_NAME: ContinueConfigGenerator-macos-intel.zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Build app bundle
        run: pipenv run pyinstaller --noconfirm --clean --windowed --name "$APP_NAME" app.py

      - name: Package artifact
        run: ditto -c -k --sequesterRsrc --keepParent "dist/$APP_NAME.app" "dist/$ARCHIVE_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: dist/${{ env.ARCHIVE_NAME }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARCHIVE_NAME }}

