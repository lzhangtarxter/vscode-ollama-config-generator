name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025
    env:
      PYTHON_VERSION: "3.14"
      APP_NAME: ContinueConfigGenerator
      ARCHIVE_NAME: ContinueConfigGenerator-windows-x64.zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Install Windows packaging dependency
        run: pipenv run python -m pip install pywin32-ctypes

      - name: Build app bundle
        run: pipenv run pyinstaller --noconfirm --clean --windowed --name $env:APP_NAME app.py

      - name: Package artifact
        run: Compress-Archive -Path "dist\\$env:APP_NAME\\*" -DestinationPath "dist\\$env:ARCHIVE_NAME" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/${{ env.ARCHIVE_NAME }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARCHIVE_NAME }}
