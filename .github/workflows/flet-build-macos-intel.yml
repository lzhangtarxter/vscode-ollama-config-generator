name: Flet Build macOS Intel

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15-intel
    env:
      PYTHON_VERSION: "3.14"
      FLET_VERSION: "0.82.2"
      FLUTTER_VERSION: "3.41.4"
      ARCHIVE_NAME: ContinueConfigGenerator-flet-macos-intel.zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install Pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Install Flet CLI
        run: pipenv run python -m pip install "flet[cli]==${FLET_VERSION}"

      - name: Build app with Flet
        run: pipenv run flet build macos --module-name app

      - name: Package artifact
        run: ditto -c -k --sequesterRsrc --keepParent build/macos "build/${ARCHIVE_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: flet-macos-intel
          path: build/${{ env.ARCHIVE_NAME }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.ARCHIVE_NAME }}
