name: Flet Build Linux

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.14"
      FLET_VERSION: "0.82.2"
      ARCHIVE_NAME: ContinueConfigGenerator-flet-linux-x64.tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Install Flet CLI
        run: pipenv run python -m pip install "flet[cli]==${FLET_VERSION}"

      - name: Build app with Flet
        run: pipenv run flet build linux app.py

      - name: Package artifact
        run: tar -czf "build/${ARCHIVE_NAME}" -C build linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-linux-x64
          path: build/${{ env.ARCHIVE_NAME }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.ARCHIVE_NAME }}
